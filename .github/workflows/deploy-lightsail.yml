name: Deploy to Lightsail (vaniam-ai)

on:
  push:
    branches:
      - vaniam-ai
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout vaniam-ai
        uses: actions/checkout@v6
        with:
          ref: vaniam-ai

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=vaniam-ai
            type=sha,prefix=vaniam-ai-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=vaniam-ai
          cache-to: type=gha,scope=vaniam-ai,mode=max
          build-args: |
            OPENCLAW_VARIANT=default

  deploy:
    name: Deploy to Lightsail
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ github.repository }}:vaniam-ai"

            echo "==> Logging in to GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Updating deployment"
            OPENCLAW_IMAGE="$IMAGE" \
              docker compose \
                -f /opt/openclaw/docker-compose.prod.yml \
                up -d --remove-orphans

            echo "==> Waiting for gateway to become healthy"
            for i in $(seq 1 12); do
              CONTAINER_ID=$(docker compose \
                -f /opt/openclaw/docker-compose.prod.yml \
                ps -q openclaw-gateway 2>/dev/null || true)
              STATUS="unknown"
              if [ -n "$CONTAINER_ID" ]; then
                STATUS=$(docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' \
                  "$CONTAINER_ID" 2>/dev/null || echo "unknown")
              fi
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                echo "Gateway is ${STATUS} after $((i * 5))s"
                break
              fi
              echo "  Waiting... ($STATUS)"
              sleep 5
            done

            echo "==> Pruning old images"
            docker image prune -f \
              --filter "label=org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              || true

            echo "==> Deploy complete"
            docker compose -f /opt/openclaw/docker-compose.prod.yml ps
