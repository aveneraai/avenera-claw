name: Deploy to Lightsail (vaniam-ai)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to build and deploy
        default: vaniam-ai
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=vaniam-ai
            type=sha,prefix=vaniam-ai-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=vaniam-ai
          cache-to: type=gha,scope=vaniam-ai,mode=max
          build-args: |
            OPENCLAW_VARIANT=default

  deploy:
    name: Deploy to Lightsail
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail

            export OPENCLAW_IMAGE="ghcr.io/${{ github.repository }}:vaniam-ai"

            echo "==> Logging in to GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> Pulling image: $OPENCLAW_IMAGE"
            docker pull "$OPENCLAW_IMAGE"

            echo "==> Updating deployment"
            docker compose -f /opt/openclaw/docker-compose.prod.yml up -d --remove-orphans

            echo "==> Waiting for gateway to become healthy (up to 90s)"
            for i in $(seq 1 18); do
              CONTAINER_ID=$(docker compose \
                -f /opt/openclaw/docker-compose.prod.yml \
                ps -q openclaw-gateway 2>/dev/null || true)
              STATUS="unknown"
              if [ -n "$CONTAINER_ID" ]; then
                STATUS=$(docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' \
                  "$CONTAINER_ID" 2>/dev/null || echo "unknown")
              fi
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                echo "Gateway is ${STATUS} after $((i * 5))s"
                break
              fi
              echo "  Waiting... ($STATUS)"
              sleep 5
            done

            echo "==> Pruning old images"
            docker image prune -f \
              --filter "label=org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              || true

            echo "==> Applying post-deploy config"
            docker compose -f /opt/openclaw/docker-compose.prod.yml \
              exec -T openclaw-gateway \
              node dist/index.js config set agents.defaults.model \
              bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0 || true

            echo "==> Deploy complete"
            docker compose -f /opt/openclaw/docker-compose.prod.yml ps

      - name: Write job summary
        if: always()
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:vaniam-ai"
          GATEWAY_URL="${{ vars.GATEWAY_URL }}"
          SHA="${{ github.sha }}"

          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$GATEWAY_URL" ]; then
            echo "**Gateway location:** $GATEWAY_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Gateway location:** Lightsail instance (set \`GATEWAY_URL\` variable to show URL)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`$IMAGE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
