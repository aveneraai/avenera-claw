name: Deploy to Lightsail (vaniam-ai)

on:
  push:
    branches:
      - vaniam-ai
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to build and deploy
        default: vaniam-ai
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    name: Build & Deploy to Lightsail
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env

      - name: Bundle A2UI (with stub fallback)
        run: |
          pnpm canvas:a2ui:bundle || {
            mkdir -p src/canvas-host/a2ui
            printf '/* A2UI bundle unavailable in this build */\n' \
              > src/canvas-host/a2ui/a2ui.bundle.js
            printf 'stub\n' > src/canvas-host/a2ui/.bundle.hash
          }

      - name: Build app
        run: |
          pnpm build:docker
          pnpm ui:build
          pnpm qa:lab:build

      - name: Prune to production deps
        run: |
          printf 'packages:\n  - .\n  - ui\n' > pnpm-workspace.yaml
          CI=true NPM_CONFIG_FROZEN_LOCKFILE=false pnpm prune --prod
          node scripts/postinstall-bundled-plugins.mjs
          find dist -type f \
            \( -name '*.d.ts' -o -name '*.d.mts' -o -name '*.d.cts' -o -name '*.map' \) \
            -delete

      - name: Stage deploy files
        run: |
          mkdir -p _deploy
          cp -a dist node_modules extensions skills docs qa _deploy/
          cp package.json openclaw.mjs _deploy/

      - name: Set up SSH
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_IP }}" >> ~/.ssh/known_hosts

      - name: rsync app to VM
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            _deploy/ \
            ubuntu@${{ secrets.LIGHTSAIL_IP }}:/opt/openclaw/app/

      - name: Restart and verify gateway
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail

            # Install Node.js 24 if missing (handles VMs provisioned before this workflow)
            if ! node --version 2>/dev/null | grep -qE '^v2[4-9]'; then
              echo "==> Installing Node.js 24"
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo bash -
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
            fi
            echo "Node $(node --version)"

            echo "==> Writing systemd service file"
            {
              echo '[Unit]'
              echo 'Description=OpenClaw Gateway'
              echo 'After=network-online.target'
              echo 'Wants=network-online.target'
              echo ''
              echo '[Service]'
              echo 'Type=simple'
              echo 'User=ubuntu'
              echo 'Group=ubuntu'
              echo 'WorkingDirectory=/opt/openclaw/app'
              echo 'EnvironmentFile=-/opt/openclaw/.env'
              echo 'Environment=HOME=/home/ubuntu'
              echo 'Environment=NODE_ENV=production'
              echo 'ExecStart=/usr/bin/node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789'
              echo 'Restart=on-failure'
              echo 'RestartSec=10'
              echo 'StandardOutput=journal'
              echo 'StandardError=journal'
              echo 'SyslogIdentifier=openclaw-gateway'
              echo ''
              echo '[Install]'
              echo 'WantedBy=multi-user.target'
            } | sudo tee /etc/systemd/system/openclaw-gateway.service > /dev/null

            echo "==> Reloading systemd and restarting gateway"
            sudo systemctl daemon-reload
            sudo systemctl enable openclaw-gateway
            sudo systemctl restart openclaw-gateway

            echo "==> Waiting for gateway to become healthy (up to 90s)"
            for i in $(seq 1 18); do
              if curl -sf http://127.0.0.1:18789/healthz > /dev/null 2>&1; then
                echo "Gateway is healthy after $((i * 5))s"
                break
              fi
              echo "  Waiting... ($((i * 5))s elapsed)"
              sleep 5
            done

            echo "==> Applying post-deploy config"
            cd /opt/openclaw/app
            node openclaw.mjs config set agents.defaults.model \
              bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0 || true

            echo "==> Deploy complete"
            sudo systemctl status openclaw-gateway --no-pager

      - name: Write job summary
        if: always()
        run: |
          GATEWAY_URL="${{ vars.GATEWAY_URL }}"
          SHA="${{ github.sha }}"

          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$GATEWAY_URL" ]; then
            echo "**Gateway location:** $GATEWAY_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Gateway location:** Lightsail instance (set \`GATEWAY_URL\` variable to show URL)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
