# Production docker-compose for the Lightsail instance.
# Deploy location on instance: /opt/openclaw/docker-compose.prod.yml
#
# Usage:
#   OPENCLAW_IMAGE=ghcr.io/aveneraai/avenera-claw:vaniam-ai \
#     docker compose -f /opt/openclaw/docker-compose.prod.yml up -d

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}
    env_file:
      - /opt/openclaw/.env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_BIND: lan
    volumes:
      - openclaw-state:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - gateway
      - --allow-unconfigured
      - --bind
      - lan
      - --port
      - "18789"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  openclaw-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/openclaw/state
  openclaw-workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/openclaw/workspace
